name: ummah_admin_panel
description: Ummah B2B Admin Timetable Verification Panel
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # HTTP layer
  http: ^1.2.1

  # Web-compatible file picker for local images
  file_picker: ^8.0.0

  # Typography (Google Fonts)
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
