name: ummah
description: Ummah — Hyper-localized Islamic lifestyle app
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter

  # State management & DI
  flutter_riverpod: ^2.5.1

  # HTTP
  http: ^1.2.1

  # Location — permission handling + GPS
  geolocator: ^12.0.0

  # Permission rationale dialog + open-settings button
  permission_handler: ^11.3.1

  # Secure JWT storage
  #   Android: EncryptedSharedPreferences (AES-256), requires minSdkVersion 23
  #   iOS:     Keychain Services
  flutter_secure_storage: ^9.2.2

  # 3D mosque gamification (Sprint 5)
  flutter_3d_controller: ^1.5.1

  # Typography — Inter for Latin, Noto Sans Arabic for RTL (Sprint 7)
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.4          # mock-based unit testing
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
