version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: ummah_postgres
    environment:
      POSTGRES_USER: ummah_admin
      POSTGRES_PASSWORD: ummah_password
      POSTGRES_DB: ummah_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ummah_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata: