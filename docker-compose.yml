version: '3.8'

services:
  # 1. PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: ummah_postgres
    environment:
      POSTGRES_USER: ummah_admin
      POSTGRES_PASSWORD: ummah_password
      POSTGRES_DB: ummah_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ummah_admin -d ummah_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Redis Geospatial Cache
  redis:
    image: redis:7-alpine
    container_name: ummah_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # 3. Node.js Express API
  backend:
    build:
      context: ./Ummah-backend
      dockerfile: Dockerfile
    container_name: ummah_backend
    ports:
      - "3000:3000"
    environment:
      # Use internal Docker DNS names to connect to DB and Redis
      - DATABASE_URL=postgresql://ummah_admin:ummah_password@postgres:5432/ummah_db?schema=public
      - REDIS_URL=redis://redis:6379
      # redis.js uses HOST/PORT split form, so set them explicitly here too
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:-4a9f2c8e1d7b3a6f5e0c2d9b8a4f1e7c3d6b9a2e5f8c1d4b7a0e3f6c9d2b5a8}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy # Waits for pg_isready to pass

  # 4. Flutter Web Admin Panel (Nginx)
  admin-panel:
    build:
      context: ./ummah_admin_panel
      dockerfile: Dockerfile
    container_name: ummah_admin_panel
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data: